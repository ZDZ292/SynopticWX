<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SlateWeather PRO</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <div class="control-panel">
            <input type="text" id="searchInput" placeholder="Enter station identifiers or region...">
            <button id="searchBtn">QUERY</button>
        </div>

        <div id="alerts-container" class="alerts-box">
            <p class="status-msg">Initializing local hazard advisory telemetry...</p>
        </div>

        <div class="main-card">
            <div class="current-weather">
                <div class="metrics-left">
                    <h1 class="location-title">Chicago</h1>
                    <div class="main-temp">--</div>
                    <div class="condition-text">Connecting to national environmental feeds...</div>
                    <div class="hi-lo">High: --</div>
                </div>
                <div class="metrics-right">
                    <img src="icons/44.png" alt="Operational status icon" class="main-weather-icon">
                </div>
            </div>
        </div>

        <div class="module-title">Hourly Grid Output</div>
        <div class="hourly-section">
            <div id="hourly-container" class="hourly-timeline">
                </div>
        </div>

        <div class="module-title">Extended Strategic Outlook</div>
        <div class="daily-section">
            <div id="daily-container" class="forecast-list">
                </div>
        </div>

        <div class="module-title">Convective Parameters & Mechanics</div>
        <div class="metric-container">
            <div class="metrics-grid">
                <div class="metric-row">
                    <span>Dewpoint</span>
                    <span id="metric-dewpoint" class="value">--</span>
                </div>
                <div class="metric-row">
                    <span>Relative Humidity</span>
                    <span id="metric-humidity" class="value">--</span>
                </div>
                <div class="metric-row">
                    <span>Wind Velocity</span>
                    <span id="metric-wind" class="value">--</span>
                </div>
                <div class="metric-row">
                    <span>Apparent Temp</span>
                    <span id="metric-apparent" class="value">--</span>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
